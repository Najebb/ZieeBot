app = 'jebb-bot'
primary_region = 'sin'

[build]
  builder = 'heroku/buildpacks:20'

[env]
  NODE_ENV = 'production'

[[mounts]]
  source = 'jebb_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

